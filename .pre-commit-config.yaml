# Pre-commit hooks configuration for Photos Manager CLI
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff - ultra-fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter
      - id: ruff-format

  # mypy - static type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5.0
        args: [--strict, --ignore-missing-imports]

  # interrogate - check docstring coverage
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: [--fail-under=80, --verbose, --color, --style=google]
        pass_filenames: false

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Prevent giant files from being committed
      - id: check-added-large-files
        args: [--maxkb=1000]
      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict
      # Check for merge conflicts
      - id: check-merge-conflict
      # Check for debugger imports and py37+ breakpoint() calls
      - id: debug-statements
      # Check whether files parse as valid python
      - id: check-ast
      # Check for valid Python docstrings
      - id: check-docstring-first
      # Check JSON files for parseable syntax
      - id: check-json
      # Check YAML files for parseable syntax
      - id: check-yaml
        args: [--unsafe]  # Allow custom tags
      # Check TOML files for parseable syntax
      - id: check-toml
      # Ensure files end with a newline
      - id: end-of-file-fixer
      # Remove trailing whitespace
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      # Sort requirements.txt files
      - id: requirements-txt-fixer
      # Prevent committing to main/master (disabled for initial setup)
      # - id: no-commit-to-branch
      #   args: [--branch=main, --branch=master]

  # Poetry - check pyproject.toml validity
  - repo: https://github.com/python-poetry/poetry
    rev: 1.8.0
    hooks:
      - id: poetry-check
      - id: poetry-lock
        args: [--no-update]

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

# Configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [poetry-lock]  # Skip poetry-lock in CI as it can be slow
  submodules: false
