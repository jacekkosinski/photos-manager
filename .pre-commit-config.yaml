# Pre-commit hooks configuration for Photos Manager CLI
# Install: pre-commit install
# Run manually: pre-commit run --all-files

default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

default_stages:
  - pre-commit

repos:
  # Meta hooks - validate pre-commit configuration itself
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  # Ruff - ultra-fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Run the formatter
      - id: ruff-format

  # mypy - static type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.5.0
        args: [--strict, --ignore-missing-imports]

  # interrogate - check docstring coverage
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: [--fail-under=80, --verbose, --color, --style=google]
        pass_filenames: false

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Prevent giant files from being committed
      - id: check-added-large-files
        args: [--maxkb=1000]
      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict
      # Check for merge conflicts
      - id: check-merge-conflict
      # Check for debugger imports and py37+ breakpoint() calls
      - id: debug-statements
      # Check whether files parse as valid python
      - id: check-ast
      # Check for valid Python docstrings
      - id: check-docstring-first
      # Check YAML files for parseable syntax
      - id: check-yaml
        args: [--unsafe] # Allow custom tags
      # Check TOML files for parseable syntax
      - id: check-toml
      # Ensure files end with a newline
      - id: end-of-file-fixer
      # Remove trailing whitespace
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      # Prevent accidentally committing private keys
      - id: detect-private-key
      # Ensure executable scripts have shebangs
      - id: check-executables-have-shebangs
      # Ensure scripts with shebangs are executable
      - id: check-shebang-scripts-are-executable
      # Prevent mixed line endings (CRLF/LF)
      - id: mixed-line-ending
        args: [--fix=lf]
      # Prevent committing to main/master (disabled for initial setup)
      # - id: no-commit-to-branch
      #   args: [--branch=main, --branch=master]

  # Poetry - check pyproject.toml validity
  - repo: https://github.com/python-poetry/poetry
    rev: 2.2.1
    hooks:
      - id: poetry-check
      - id: poetry-lock
        args: [--regenerate]

  # Security checks - bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  # pyproject.toml formatter - ensures consistent formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.11.1
    hooks:
      - id: pyproject-fmt

  # Dead code detection - finds unused functions, classes, and variables
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        args: [".", "--min-confidence", "80"]

  # Spell checker - catches typos in code and documentation
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: codespell
        # Config section is within pyproject.toml
        language: python
        types: [text]
        args: ["--write-changes"]
        additional_dependencies:
          - tomli

  # Format code blocks in documentation (markdown, rst)
  - repo: https://github.com/adamchainz/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs
        additional_dependencies:
          - black==22.12.0

  # Conventional commits - enforces commit message format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.11.1 # automatically updated by Commitizen
    hooks:
      # Validates commit message format (commit-msg hook)
      - id: commitizen
      # Validates branch name after commit (post-commit hook)
      - id: commitizen-branch
        stages:
          - post-commit

  # Code complexity checker - prevents overly complex code
  - repo: https://github.com/yunojuno/pre-commit-xenon
    rev: v0.1
    hooks:
      - id: xenon
        args:
          - --max-absolute=D # Maximum complexity for any function
          - --max-modules=B # Maximum average for modules
          - --max-average=B # Maximum average for project

  # Markdown formatter - ensures consistent documentation formatting (Python-based)
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.21
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm # GitHub Flavored Markdown support
          - mdformat-tables # Better table formatting
        args: [--wrap, "80"]

  # Prettier - opinionated formatter for YAML files
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml]

# Configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: [poetry-lock] # Skip poetry-lock in CI as it can be slow
  submodules: false
